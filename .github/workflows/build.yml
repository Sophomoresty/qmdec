name: Build Windows Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyinstaller music-tag Pillow

      - name: Build exe
        run: |
          pyinstaller --onefile --name qmdec --icon assets/icon.ico src/qmdec/cli.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmdec-windows
          path: dist/qmdec.exe

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/qmdec.exe
